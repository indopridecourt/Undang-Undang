<style>
/* GLOBAL */
body {
    background: #f4f6f9;
    font-family: Georgia, 'Times New Roman', serif;
    color: #1f2937;
}

/* HEADER */
.header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 28px;
    background: #1f3347;
    color: white;
    border-bottom: 2px solid #c9a74e;
}

.logo {
    width: 52px;
}

/* FIX ALIGN */
.header-center {
    display: flex;
    flex-direction: column;
    justify-content: center;
    line-height: 1.25;
}

/* TYPOGRAPHY FIX */
.header-title {
    font-size: 19px;
    font-weight: 700;
    letter-spacing: 1.2px;
}

.header-sub {
    font-size: 13px;
    margin-top: 2px;
    color: #d1d5db;
}

.header-address {
    font-size: 11.5px;
    margin-top: 2px;
    color: #9ca3af;
}

/* CONTAINER */
.container-box {
    margin-top: 18px;
}

/* SIDEBAR */
.sidebar {
    background: #ffffff;
    border: 1px solid #e5e7eb;
    padding: 14px;
    height: 85vh;
    overflow-y: auto;
    border-radius: 6px;
}

.sidebar-title {
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 10px;
    color: #6b7280;
    border-bottom: 1px solid #e5e7eb;
    padding-bottom: 6px;
}

/* BUTTON SWITCH */
.doc-btn {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 4px;
}

.doc-btn.active {
    background: #1f3347;
    color: white;
}

/* SEARCH */
.search-box {
    font-size: 13px;
    margin-bottom: 10px;
    border-radius: 4px;
}

/* BAB LIST */
.bab-item {
    padding: 8px 10px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.15s ease;
    border-radius: 4px;
}

.bab-item:hover {
    background: #f3f4f6;
}

.bab-item.active {
    border-left: 3px solid #c9a74e;
    background: #f9fafb;
}

/* TYPOGRAPHY BAB */
.bab-title {
    font-size: 12.5px;
    font-weight: 600;
}

.bab-sub {
    font-size: 11.5px;
    color: #6b7280;
}

/* CONTENT */
.content {
    background: white;
    border: 1px solid #e5e7eb;
    border-radius: 6px;
}

/* HEADER CONTENT */
.content-header {
    padding: 14px 18px;
    border-bottom: 1px solid #e5e7eb;
    font-weight: 600;
    font-size: 14px;
    background: #fafafa;
}

/* IFRAME */
.doc-frame {
    width: 100%;
    height: 82vh;
    border: none;
}

/* FOOTER */
.footer {
    text-align: center;
    font-size: 11px;
    padding: 8px;
    color: #9ca3af;
}

<body>

<div class="header">
    <div class="header-left">
        <img src="logo.png" alt="Logo" class="logo">
    </div>

    <div class="header-center">
        <div class="header-title">PENGADILAN KOTA INDOPRIDE</div>
        <div class="header-sub">Sistem Informasi Peraturan & Perundang-undangan</div>
        <div class="header-address">
            Jl. Occupation Avenue Kota Indopride – Kode Pos 7239
        </div>
    </div>
</div>

<div class="container container-box">
<div class="row">

<!-- SIDEBAR -->
<div class="col-md-3">
<div class="sidebar">

    <div class="mb-2">
        <button class="btn btn-sm doc-btn active" onclick="switchDoc('uud', this)">UU Dasar</button>
        <button class="btn btn-sm btn-outline-secondary doc-btn" onclick="switchDoc('pidana', this)">KUHPidana</button>
        <button class="btn btn-sm btn-outline-secondary doc-btn" onclick="switchDoc('perdata', this)">KUHPerdata</button>
    </div>

    <input type="text" id="search" class="form-control search-box" placeholder="Cari BAB...">

    <div class="sidebar-title">Daftar BAB</div>

    <div id="babList"></div>

</div>
</div>

<div class="col-md-9">
<div class="content">

let currentDoc = "uud";

function renderList() {
    const list = docs[currentDoc].bab;
    const container = document.getElementById("babList");
    container.innerHTML = "";

    list.forEach((b, i) => {
        const div = document.createElement("div");
        div.className = "bab-item";

        div.innerHTML = `
            <div class="bab-title">${b.nama}</div>
            <div class="bab-sub">${b.judul}</div>
        `;

        div.onclick = () => {
            loadBab(b.anchor);
            document.querySelectorAll(".bab-item").forEach(x => x.classList.remove("active"));
            div.classList.add("active");
        };

        container.appendChild(div);

        if (i === 0) div.click();
    });
}

/* 🔥 PENTING: pakai preview biar toolbar hilang */
function loadBab(anchor) {
    const base = docs[currentDoc].base.replace("/edit", "/preview")+ "?rm=minimal";
    document.getElementById("docFrame").src = base + "#heading=" + anchor;
}

function switchDoc(type, el) {
    currentDoc = type;
    document.getElementById("judul").innerText = docs[type].title;

    document.querySelectorAll(".doc-btn").forEach(btn => {
        btn.classList.remove("active");
        btn.classList.add("btn-outline-secondary");
    });

    el.classList.add("active");
    el.classList.remove("btn-outline-secondary");

    renderList();
}

document.getElementById("search").addEventListener("input", function() {
    const keyword = this.value.toLowerCase();

    const filtered = docs[currentDoc].bab.filter(b =>
        (b.nama + " " + b.judul).toLowerCase().includes(keyword)
    );

    const container = document.getElementById("babList");
    container.innerHTML = "";

    filtered.forEach(b => {
        const div = document.createElement("div");
        div.className = "bab-item";

        div.innerHTML = `
            <div class="bab-title">${b.nama}</div>
            <div class="bab-sub">${b.judul}</div>
        `;

        div.onclick = () => loadBab(b.anchor);
        container.appendChild(div);
    });
});

renderList();
